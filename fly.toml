app = "slack-daily-trivia"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "trivia_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_starts_machines = true
  auto_stop_machines = false

  [[services.ports]]
    port = 8080
    handlers = ["tls"]

[experimental]
  auto_rollback = true
